var BD={"Al Nicholls Quartet":"Swinging, warm-toned tenor sax in the 1940s–50s Texas Tenors tradition. After Leeds College of Music, Al played with The Big Town Playboys, King Pleasure and Ray Gelato; he now leads his own quartet and hosts a twice-monthly residency at Soho's Spice of Life Club.","Alan Barnes Quartet":"Prolific international performer on clarinet, alto and baritone sax. Sessions with Charlie Watts, Bryan Ferry, Jools Holland and Jamie Cullum; tours with Ruby Braff, Freddie Hubbard and Scott Hamilton. Over 30 British Jazz Awards; twice named BBC Jazz Musician of the Year.","Andres Roots (Estonia)":"Estonian slide guitar wizard celebrating 30 years as a musician in 2026, alongside his 50th birthday. Has played everywhere from Morgan Freeman's Ground Zero Blues Club in Mississippi to the German parliament, and topped the charts in Estonia. Festival debut in 2024 was acclaimed as a masterclass in fluid acoustic blues.","Anvil Chorus":"West Midlands Barbershop Harmony Club, formed 1977 and based in Great Barr. Performs four-part barbershop arrangements; recent winners at Dudley Music Festival. A registered charity; meets Tuesday evenings at the Beacon Church in Pheasey — new members always welcome.","Art Themen Quartet":"Over 60 years on the jazz scene, with a career alongside Alexis Korner, Stan Tracey and American giants including Arturo Sandoval — all while working as a consultant orthopaedic surgeon. Recipient of a Worshipful Company of Musicians lifetime achievement award. Still astonishing audiences at 86.","Back on the Road":"Rock, pop and blues classics delivered with crowd-pleasing energy. Tony O'Brien (vocals), Richard Fedeski (piano), Ray Sweeney and Stevie Barr (guitars), Bill Jefferson (drums). Particular favourites at Birmingham Rocks at Snobs.","B.D. Lenz (USA)":"American jazz guitarist whose funky, virtuosic music has appeared on hundreds of TV shows worldwide. With James Rosocha (bass) and Joe Falcey (drums), the trio mixes jazz standards, original grooves and reimagined pop classics. A regular stop on their extended European tours.","Ben Toury (France)":"French pianist, harmonica player, singer and composer — a whirlwind of modern boogie. Self-taught; opened for Bob Brozman at Le Creusot Blues Festival aged 13. Touring Europe and the USA ever since; planning Volume 4 of Wild Boogie-Woogie in 2026.","Billy Thompson Gypsy Style":"Violin virtuoso, twice Young Jazz Musician, and former key member of Barbara Thompson's Paraphernalia. Has played alongside Gary Potter, John Etheridge, Martin Taylor and Howard Alden. Programme: Hot Club classics, fiery Hungarian tunes, unusual covers and originals.","Birmingham Big Band with Suzi Woods":"17-piece big band under John Ruddick playing popular and contemporary big band jazz. Quarterly residency at Moseley All Services Club with distinguished guests. Festival vocalist Suzi Woods is always a crowd favourite.","Birmingham: A City Rooted in Talent":"Documentary series by D.G. Torrens and Martin Tracey, spotlighting Birmingham's creative heritage through archival footage and interviews. Covers musicians, broadcasters, sports personalities and cultural pioneers — from Black Sabbath and Duran Duran and many more.","Brad Henshaw":"Birmingham-born singer-songwriter who has collaborated with Whitney Houston, Buddy Guy, Blur, Richard Ashcroft, UB40, Rod Stewart and Shirley Bassey. A distinctive Americana and Southern Rock sound shaped by significant time in the USA.","Bruce Adams Quartet":"One of the most spectacular trumpet techniques in British jazz and a long-standing festival favourite. A 30-year association with Alan Barnes and a track record alongside jazz greats on both sides of the Atlantic. Now partnered with Eclipse Trumpets.","Buddy Guy on Film":"Special screening at Box, Brindleyplace celebrating Buddy Guy's 90th birthday on Buddy Guy Day. Buddy first played Birmingham in 1964 and has headlined at this festival with his Buddy Guy/Junior Wells Chicago Blues Band.","Buddy Guy on Record":"Listening event at RPM Analogue Audio exploring the recorded legacy of Buddy Guy who turns 90 today. Around 40 albums, nine Grammy Awards, and an 18-month Damn Right Farewell World Tour that ended in 2024.","Chickenbone John & Harmonica Dave":"The Godfather of the Cigar Box Guitar; star of the BBC documentary Cigar Box Blues and organiser of the annual Boxstock Festival. Recreates the raw sound of the Mississippi juke joints alongside longtime collaborator Harmonica Dave.","Chickenbone Blues Band":"Chickenbone John leads his full blues band in the raw Delta tradition. He starred in the BBC documentary Cigar Box Blues and organises the annual Boxstock Festival.","The Buskateers":"Tim and Billy busking for West Midlands charities with friends Pete Wain, Bleak December, Alan Warden and Tony Edwards. Old blues, jazz and skiffle via washboard, kazoo, whistles and banjo.","The Delta Aces":"Delta and Chicago Blues duo with eight years of festival and club experience across the UK and abroad. Heartfelt vocals, expert guitar and soulful harmonica — likened to Sonny Terry and Brownie McGhee. New album Educated Man praised for its vintage, authentic sound.","Dirt Road Band":"Steve Walwyn (guitar/vocals — Dr Feelgood, 32 years), Horace Panter (bass — founding Specials member) and Ted Duggan (drums — Banco de Gaia, Badfinger). Hard, punchy blues-rock; critically acclaimed debut album Righteous released July 2024.","Django Chutney":"Brighton-based gypsy-jazz trio since 2021. Three-part vocal harmonies, virtuosic guitar and an infectious sense of fun across jazz, blues, folk and more. 'All ages and all musical tastes will find something to enjoy.'","Edgar Macias Piquero Quintet":"Venezuelan-born pianist and musical director; one of the Midlands' leading figures in jazz, Latin jazz and salsa. Quintet: Chris Bowden (sax), Tom Hill (bass/vocals), Miles Levin (drums), Nestor Pedrales (congas). Acclaimed for vibrant Buena Vista Social Club reinterpretations.","Florence Joelle":"Paris-born jazz singer, songwriter and harmonica player based in London. Albums blend French chanson, classic jazz, gypsy folk and fifties R&B. Songs broadcast on BBC Radio (twice Song of the Week on BBC Introducing), Jazz FM and digital stations worldwide.","Get Loose":"High-energy Oxfordshire-based blues rock band. Lee Castle (guitar) and Paul Ashby (harmonica) channel classic rock fused with blues. 'A melting pot of great lyrics and a swagger that will have you playing it over and over.'","Hit Parade Heroes":"Warren James and band celebrate the 1950s and 60s British Hit Parade: Tommy Steele, Joe Brown, Lonnie Donegan plus American stars including Johnny Cash, Eddie Cochran and Gene Vincent. Over two hours of musical nostalgia.","Honeyboy Hickling Blues Band":"Rocking post-war Chicago-style blues. Honeyboy (harmonica/vocals) toured with Steve Marriott and recorded with Bo Diddley. Guitarist Bob Wilson played with Idle Race and Ruby Turner. Tony Baylis served with Chicken Shack. Impeccable pedigrees, top-class musicianship.","Hot Club of Halifax":"Acclaimed jazz and swing band from Halifax. Christine Pickard (clarinet), Vernon Bigsby (lead guitar), Gerard Paul Camallari (rhythm guitar/vocals) and Grant Russell (bass). Use clarinet rather than violin for jazz manouche and swing standards.","Jake Henry":"Multi-instrumentalist and songwriter appearing as pianist and vocalist. Influenced by Stevie Wonder, Ray Charles and Bill Withers.","Jake Henry Trio":"Multi-instrumentalist appearing as pianist and vocalist with his trio. Influenced by Stevie Wonder, Ray Charles and Bill Withers.","Jake Leg Jug Band":"Authentic sounds of 1920s America: jazz, blues, ragtime and gospel; songs of murder, betrayal, gambling and redemption. 14 years on the road, nearly 800 gigs, 10 albums and BBC Radio 2 airplay.","James Oliver Band":"Wales's James Oliver (300+ gigs a year, UK Blues Awards Emerging Artist 2020) paired with bass legend Norman Watt Roy (Ian Dury and the Blockheads, Wilko Johnson) and drummer Mark Kemlo.","Jamie Thyer & The Worried Men":"Regarded as a guitarist's guitarist; toured alongside Chicken Shack, Robin Trower, Robert Cray, Peter Green and Johnny Winter. Latest album Excelsior earned Record of the Week on Radio Caroline. 'British blues guitar men? There's Eric Clapton, Peter Green... and Jamie Thyer!'","Jazz & Blues Murder Mystery Night":"Play detective at the Victorian Lock-Up (West Midlands Police Museum) with a jazz and blues theme. See the murder scene, interview suspects and solve the crime. Teams up to 6; over-18s only. Book at trybooking.com/uk/GMIZ.","John Hemming & The Jazz Lobbyists":"Former MP for Birmingham Yardley, now researching molecular biology. An accomplished jazz pianist who assembles a fine band for melodic jazz, with vocalist Lorraine Olley.","Jukebox Rhythm Orchestra":"13-piece band from Coventry under Mark Allison. Swings through Benny Goodman and Ella Fitzgerald to Caro Emerald and Big Bad Voodoo Daddy — mainstream hits from the 1920s to the present day.","Jump Jive & Wail":"Halifax-based, 20 years raising the roof at festivals, dancehalls and jazz clubs. Boogie woogie piano, honking sax, exuberant harmonica and 3-part vocal harmonies; music from the 1940s and early 50s dance floor.","Just Doin' It":"Status Quo tribute band formed 2023. Growing repertoire of classic Quo hits from their 60-year career, capturing the feel of a live Quo show. Popular at venues from Weymouth Pavilion to Snobs Birmingham.","King Pleasure & The Biscuit Boys":"40 years and nearly 7,000 performances in 27 countries. Opened for BB King, Cab Calloway and Ray Charles; toured with the Blues Brothers Band. 11 albums on Big Bear Records. 'The unequivocal Kings of Swing.'","Lady Sings the Blues":"39 years celebrating the music of Billie Holiday. Val Wiseman is the finest interpreter of Billie's songs. Band includes Bruce Adams (trumpet), Ian Bateman (trombone), Dave Newton (piano) and Dave Green (bass).","Let's Talk Buddy Guy":"Discussion event celebrating Buddy Guy's 90th birthday: first-hand tales from musicians who shared a stage with one of the all-time blues greats.","Miho Hazama (Japan/USA)":"Multi-Grammy-nominated composer performing at the CBSO Centre with CBSO musicians, saxophonist Soweto Kinch, Tom Farmer, Shane Forbes and Ivo Neame. Original compositions alongside Herbie Hancock and Thelonious Monk — a thrilling journey through jazz past and present.","Out of the Blue Big Band":"18-piece Birmingham ensemble under Jo James. Classic big-band swing alongside Sinatra and Buble, Santana, Elton John, Oasis and Nirvana. Outstanding soloists and a rich brass-and-sax sound.","Photography Workshop":"Free workshop led by festival photographer Merlin Daleman — twice winner of the Dutch Silver Camera Award for best documentary photographer. Open to all levels.","Playing Django":"Birmingham-based festival regulars. Music based on the Quintet of the Hot Club of France, inspired by the great Django Reinhardt.","Rich Dickinson's Driving Force":"Nearly three decades on the electric blues circuit; toured extensively across the UK, Europe and the US. Well-crafted originals alongside classics from Joe Bonamassa, Rory Gallagher, Gary Moore and ZZ Top.","Rip Roaring Success":"Wild Miss Lucille (double bass), Miss Jay (fiddle) and Rusty (guitar). Western swing, rockabilly and bluegrass: Dolly Parton to Hank Williams to Elvis Presley. 'Will make you think you're in an authentic Texas dance hall.'","Roy Forbes":"Immaculate jazz vocalist whose devotion began with Nat King Cole. Has shared stages with Scott Hamilton, Benny Waters, Al Casey and Sweets Edison. A huge following at festivals worldwide including Brecon, Greenwich and St Lucia. Note: reservation required at La Bellezza.","Roy Forbes Quartet":"Roy Forbes with his full quartet: immaculate jazz vocals inspired by Nat King Cole, with a superb jazz backing band.","Royal Blues":"Hard-hitting rock and roll newcomers. Debut single picked up for an Amazon/Apple TV documentary. Three-part female harmonies cutting through dirty riffs and stomping rhythms.","The Sax Pistols":"New Orleans marching band tradition with a British twist: Second Line grooves meet Ska. Songs from Stevie Wonder via Madness to Miles Davis. Always audience-interactive. Album: Never Mind the Baroques.","The Shakedown Brothers":"Blues-rock powerhouse from the Midlands. Gritty originals and reimagined classics with energy that shakes the room. Touring blues pubs and clubs across England.","Sheila Waterfield":"UK vocalist, composer and band leader drawing on jazz, blues, soul, folk and Latin. Has appeared at London's Jazz Cafe, Ronnie Scott's and the CBS Arena. New composition Nothing Without Love forthcoming in 2026.","The Shufflepack":"Birmingham favourites. Stuart Maxwell and Tom Domagala (frontmen), Chris Lloyd (drums), Barney Nikolic (guitar). Swinging, shuffling blues and jive: honking sax, wailing harp and irresistible grooves.","Simon Spillett Quartet":"Marking 30 years on the UK jazz scene in 2026. Powerful, straight-ahead tenor sax in the tradition of the late Tubby Hayes. Sold-out Ronnie Scott's gigs; five-star debut CD Dear Tubby H. in Jazzwise.","Singitbig":"Community choir from Chorley run by Debbie Jones and Karen Strickland — no auditions. A fun, positive ensemble performing popular classics and jazzy numbers at venues from weddings to festival stages.","Slide Boy Roy":"One of the toughest boogie blues rock bands on the circuit, West Midlands-based since 2005. Over 25 years touring Europe, the USA and the UK alongside Mungo Jerry, Canned Heat and Arthur Brown.","Smokin' Ade Wakelin & Andy Hiseman":"Ade Wakelin (blues guitar, Texas and Chicago influences) with guitarist Andy Hiseman of the Barflys. A blues duo drawing on T-Bone Walker and Jimmy Vaughan traditions.","Smokin' Ade Wakelin Blues Band":"Red-hot Texas and Chicago Blues shuffles with Hammond Organ Grooves, Funk, Soul and Jazz. Joe Masterson on Hammond organ is the defining live element.","Stacy Mitchhart (USA)":"American blues guitarist and songwriter from Cincinnati. Shared stages with James Brown, Keb Mo, Buddy Guy and John Entwistle. Winner of the Albert King Guitar Player Award and multiple Music City Blues Society awards.","Strictly Jitterbug":"A festival institution. Alistair Fitzgerald leads East Coast Swing, Jitterbug, Jive and 1920s Charleston for all levels. He also uses dance in patients' rehabilitation. Come along and have a go!","Stuart Maxwell's Blues Raiders":"Hard-edged, rocking blues. Stuart Maxwell (harmonica and Hammond), Matt Edwards (guitar), Derek White (bass — Bernie Marsden), Jason Reeve (drums). Muddy Waters and Howlin' Wolf alongside the Allman Brothers.","Swing Cafe":"Popular Midlands swing and jazz band led by singer Billie Baker. The best-loved songs of the era from the 1920s to the 1950s.","The Too Hot Trio":"Billy, Rusty and Helen from Liverpool play Western Swing and Rockabilly — Bob Wills and Carl Perkins. Electric guitar, acoustic guitar and double bass. 'Guaranteed to get the joint jumping.'","Tipitina":"Powerhouse singer Debbie Jones (gospel roots) with Justin Randall, the finest New Orleans-style pianist outside of Louisiana. The music of Dr John, James Booker, Professor Longhair and Fats Domino. 'A barnstorming live act.'","Tom Lindsay":"Pianist, singer, bandleader and songwriter who blends musicianship with easy charm. Also performs with the 18-piece State 51 Swing Orchestra. Highlights include Montreux, Bologna and events for Schwarzenegger and De Niro.","Walter Smitty":"Popular Midlands performer playing acoustic Latin, jazz, blues and classic pop.","Walter Smitty & The Unviables":"Popular Midlands band playing acoustic Latin, jazz, blues and classic pop. Joined by international singer Suzi Woods, whose career includes performing for the Beckhams and Princess Caroline of Monaco.","You're Never Alone With A Uke":"Ukulele workshop for complete beginners. Jules takes players from open strings through to a full 12-bar blues on supplied instruments. Fun, practical and welcoming at all levels."};

/* ── state ── */
var state={members:null,colors:null,picks:null,me:null};
var uiDay="0",uiGf={},uiExp=-1,uiView="cal",uiCopied=false,uiPerfExp=null;

/* ── URL encoding ── */
function encSt(){try{return btoa(JSON.stringify({m:state.members,c:state.colors,p:state.picks}));}catch(e){return "";}}
function decSt(s){try{var d=JSON.parse(atob(s));if(d&&d.m&&d.p)return d;}catch(e){}return null;}
function pushSt(){var e=encSt();if(e)try{history.replaceState(null,"","#s="+e);}catch(x){}}

/* ── init ── */
(function(){
  var hash=window.location.hash;
  if(hash&&hash.slice(0,3)==="#s="){var dec=decSt(hash.slice(3));if(dec){state.members=dec.m;state.colors=dec.c;state.picks=dec.p;}}
  if(!state.members){state.members=DM.slice();state.colors=JSON.parse(JSON.stringify(MC));state.picks={};}
  state.members.forEach(function(m){if(!state.picks[m])state.picks[m]=[];});
  var saved=null;try{saved=localStorage.getItem("bjbf_me");}catch(e){}
  if(saved&&state.members.indexOf(saved)>=0){state.me=saved;draw();}else{showSetup();}
})();

/* ── helpers ── */
function he(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");}
function isFree(p){return p==="FREE"||p==="FREE*";}
function mInit(m){return m?m.charAt(0).toUpperCase():"?";}
function mCol(m){return state.colors[m]||"#374151";}
function hasPick(m,i){return state.picks[m]&&state.picks[m].indexOf(i)>=0;}
function whoWants(i){var o=[];state.members.forEach(function(m){if(hasPick(m,i))o.push(m);});return o;}
function hasKeys(o){for(var k in o){if(Object.prototype.hasOwnProperty.call(o,k))return true;}return false;}

/* ── setup overlay ── */
var setupSel=null;
function showSetup(){setupSel=null;renderSetup();}
function renderSetup(){
  var ov=document.getElementById("ov");
  ov.style.display="flex";
  var mg="";
  state.members.forEach(function(m){
    var col=mCol(m),sel=setupSel===m;
    mg+="<div class='mopt"+(sel?" mopt-sel":"")+"' data-m='"+he(m)+"' onclick='selSetup(this.dataset.m)' style='"+
        (sel?"background:"+col+";border-color:"+col+";color:#fff":"border-color:#e2d9cc")+
        "'><div style='font-size:1.2rem;margin-bottom:3px'>"+mInit(m)+"</div>"+
        "<div style='font-size:.82rem;font-weight:600'>"+he(m)+"</div></div>";
  });
  ov.innerHTML="<div class='setup-box'>"+
    "<h2>&#127926; Who are you?</h2>"+
    "<p>Choose your name to track your picks. Share the link and everyone's choices appear together.</p>"+
    "<div class='mgrid'>"+mg+"</div>"+
    "<div class='crow'><input id='cn' type='text' placeholder='Add another name...' maxlength='20'><button onclick='addCustom()'>Add</button></div>"+
    "<button class='okbtn' id='okbtn' onclick='confirmSetup()'"+(!setupSel?" disabled":"")+">Continue as "+(setupSel?he(setupSel):"...")+"</button>"+
    "</div>";
}
function selSetup(name){setupSel=name;renderSetup();}
function addCustom(){
  var inp=document.getElementById("cn");
  var nm=inp?inp.value.trim():"";
  if(!nm)return;
  if(state.members.indexOf(nm)<0){
    state.members.push(nm);state.picks[nm]=[];
    var fc=["#0891b2","#be185d","#0d9488","#c2410c","#7c3aed"];
    state.colors[nm]=fc[(state.members.length-1)%fc.length];
  }
  setupSel=nm;renderSetup();
}
function confirmSetup(){
  if(!setupSel)return;
  state.me=setupSel;
  try{localStorage.setItem("bjbf_me",state.me);}catch(e){}
  document.getElementById("ov").style.display="none";
  pushSt();draw();
}

/* ── main draw ── */
function draw(){renderMbar();renderNav();if(uiView==="cal")renderCal();else if(uiView==="my")renderMy();else if(uiView==="fam")renderFam();else renderPerf();renderLeg();}

/* ── member bar ── */
function renderMbar(){
  var h="<span class='mbar-lbl'>You are:</span>";
  state.members.forEach(function(m){
    var col=mCol(m),isMe=m===state.me;
    h+="<button class='mpill' data-m='"+he(m)+"' onclick='switchMe(this.dataset.m)' style='border-color:"+col+";background:"+(isMe?col:"transparent")+";color:"+(isMe?"#fff":col)+"'>"+(isMe?"&#10003; ":"")+he(m)+"</button>";
  });
  h+="<button class='madd' onclick='showSetup()'>+ Add person</button>";
  document.getElementById("mbar").innerHTML=h;
}
function switchMe(nm){state.me=nm;try{localStorage.setItem("bjbf_me",nm);}catch(e){}draw();}

/* ── nav ── */
function renderNav(){
  var navy="#0c1a2e",gold="#e8c87a";
  var myC=state.me&&state.picks[state.me]?state.picks[state.me].length:0;
  function nb(lbl,v){var a=uiView===v;return "<button class='mnbtn' onclick='sv(\""+v+"\")' style='background:"+(a?gold:"transparent")+";color:"+(a?navy:"#94a3b8")+";border:none'>"+lbl+"</button>";}
  document.getElementById("mn").innerHTML=nb("&#128197; Calendar","cal")+nb("&#9733; My Picks"+(myC?" ("+myC+")":""),"my")+nb("&#128106; Family View","fam")+nb("&#127908; Performers","perf");
}

/* ── calendar ── */
function renderCal(){
  var gold="#e8c87a",navy="#0c1a2e";
  var evs=[];for(var i=0;i<R.length;i++){if(R[i][0]===uiDay&&(!hasKeys(uiGf)||uiGf[R[i][4]]))evs.push(i);}
  var di=null;for(var k=0;k<DS.length;k++){if(DS[k][0]===uiDay){di=DS[k];break;}}
  if(!di)di=DS[0];
  /* days strip */
  var h="<div class='days'>";
  DS.forEach(function(d){
    var a=d[0]===uiDay;
    h+="<button class='dbtn' onclick='sd(\""+d[0]+"\")' style='background:"+(a?gold:"transparent")+";color:"+(a?navy:"#94a3b8")+";font-weight:"+(a?700:400)+"'>"+he(d[1])+(d[2]?"<span class='ds'>"+he(d[2])+"</span>":"")+"</button>";
  });
  h+="</div>";
  /* genre filter */
  h+="<div class='gfrow'><span class='gflbl'>Filter:</span>";
  ["j","b","o","g","w","s"].forEach(function(k){
    var gv=G[k],a=!!uiGf[k];
    h+="<button class='gpill' onclick='tg(\""+k+"\")' style='border-color:"+gv.c+";background:"+(a?gv.c:"transparent")+";color:"+(a?"#fff":gv.c)+"'>"+gv.e+" "+he(gv.l)+"</button>";
  });
  if(hasKeys(uiGf))h+="<button class='clrbtn' onclick='cg()'>&#10005; Clear</button>";
  h+="</div>";
  /* day heading */
  h+="<div class='dayh'><span class='dayh-t'>"+he(di[1])+"</span>";
  if(di[2])h+=" <span class='dayh-s'>"+he(di[2])+"</span>";
  h+="<span class='dayh-c'>"+evs.length+" event"+(evs.length!==1?"s":"")+" &bull; Tap to expand &bull; &#9733; to pick</span></div>";
  h+="<div class='evlist'>";
  if(!evs.length)h+="<div class='noevent'>No events match your filter.</div>";
  evs.forEach(function(i){h+=cardHtml(i);});
  h+="</div>";
  document.getElementById("ct").innerHTML=h;
}

/* ── my picks ── */
function renderMy(){
  var myP=state.me&&state.picks[state.me]?state.picks[state.me]:[];
  var fe=[];for(var i=0;i<R.length;i++){if(myP.indexOf(i)>=0)fe.push(i);}
  var col=state.me?mCol(state.me):"#0c1a2e";
  var h="<div class='ph'><h2 style='color:"+col+"'>"+he(state.me||"Your")+"'s picks &mdash; "+fe.length+" event"+(fe.length!==1?"s":"")+"</h2>"+
    "<button class='copybtn' onclick='cp()' style='background:"+col+"'>"+(uiCopied?"&#10003; Copied!":"&#128203; Copy for WhatsApp")+"</button></div>";
  if(!fe.length){h+="<div class='empty'><div style='font-size:2rem;margin-bottom:8px'>&#9734;</div>No picks yet.<br><span style='font-size:.8rem;margin-top:6px;display:inline-block'>Tap &#9733; in the Calendar tab to pick events.</span></div>";}
  else{
    h+="<div style='padding:4px 10px 20px'>";
    DS.forEach(function(d){
      var de=fe.filter(function(i){return R[i][0]===d[0];});
      if(!de.length)return;
      h+="<div class='dlbl'>"+he(d[1])+(d[2]?" &bull; "+he(d[2]):"")+"</div>";
      de.forEach(function(i){h+=cardHtml(i);});
    });
    h+="</div>";
  }
  document.getElementById("ct").innerHTML=h;
}

/* ── family view ── */
function renderFam(){
  var h="<div class='ph'><h2>Family View &mdash; all picks</h2></div>";
  h+="<div style='padding:4px 10px 6px'>";
  state.members.forEach(function(m){

  });
  h+="</div>";
  var ap={};
  state.members.forEach(function(m){(state.picks[m]||[]).forEach(function(i){ap[i]=true;});});
  var ai=Object.keys(ap).map(Number).sort(function(a,b){

  else{
    h+="<div style='padding:4px 10px 20px'>";

      var de=ai.filter(function(i){return R[i][0]===d[0];});

      h+="<div class='dlbl'>"+he(d[1])+(d[2]?" &bull; "+he(d[2]):"")+"</div>";
      de.forEach(function(i){h+=cardHtml(i);});
    });
    h+="</div>";
  }

/* ── event card ── */
function cardHtml(idx){
  var e=R[idx],gk=e[4],p=e[5],note=e[6]||"";
  var gv=G[gk];
  var fr=isFree(p),isInc=p==="Incl.";
  var pBg=fr?"#d1fae5":(isInc?"#f3f4f6":"#dbeafe");
  var pCol=fr?"#065f46":(isInc?"#374151":"#1e40af");
  var isExp=uiExp===idx;
  var myPick=hasPick(state.me,idx);
  var bdr=myPick?"2px solid "+mCol(state.me):"1px solid #e2d9cc";
  var ww=whoWants(idx);

  /* star button */
  var sb="";
  if(state.me){
    var mc=mCol(state.me);
    sb="<div class='srow'><button class='sbtn' onclick='event.stopPropagation();tf("+idx+")' style='color:"+(myPick?mc:"#d1d5db")+"' title='"+(myPick?"Remove":"Add to my picks")+"'>&#9733;</button></div>";
  }

  var h="<div class='card' style='border:"+bdr+"'>";
  h+="<div class='cmain' onclick='te("+idx+")'>";
  h+="<div class='tb'><div class='ti'>"+he(e[1])+"</div><div class='gi'>"+gv.e+"</div></div>";
  h+="<div class='inf'><div class='an'>"+he(e[3])+"</div>";
  h+="<div class='vn'>"+he(e[2]);
  if(p==="FREE*")h+=" <span style='color:#b45309;font-size:.64rem;font-style:italic'>&bull; Reservation required</span>";
  h+="</div>";
  if(ww.length){
    h+="<div class='wdots'>";
    ww.forEach(function(m){h+="<span class='wdot' style='background:"+mCol(m)+"'>"+he(mInit(m))+"</span>";});
    h+="</div>";
  }
  h+="</div>";
  h+="<span class='prtag' style='background:"+pBg+";color:"+pCol+"'>"+he(p)+"</span>";
  h+=sb;
  h+="</div>"; /* cmain */

  if(isExp){
    h+="<div class='expbox'>";
    /* genre badge */
    h+="<div class='exprow'><span class='gbadge' style='background:"+gv.bg+";color:"+gv.c+"'>"+gv.e+" "+he(gv.l)+"</span></div>";
    /* note */
    if(note)h+="<div class='expnote'>"+he(note)+"</div>";
    /* artist bio */
    var bio=BD[e[3]]||"";
    if(bio)h+="<div class='bio'>"+he(bio)+"</div>";
    /* venue block */
    var vd=VD[e[2]];
    var mq=encodeURIComponent(vd?vd.mq:e[2]+", Birmingham");
    h+="<div class='vblock'>";
    h+="<div class='vb-name'>"+he(e[2])+"</div>";
    if(vd){
      h+="<div class='vb-addr'>"+he(vd.addr)+"</div>";
      if(vd.phone)h+="<div class='vb-phone'>&#128222; "+he(vd.phone)+"</div>";
    }
    h+="<div class='vlinks'>";
    h+="<a class='vl vl-g' href='https://www.google.com/maps/search/?api=1&query="+mq+"' target='_blank' rel='noopener'>&#128205; Google Maps</a>";
    h+="<a class='vl vl-a' href='https://maps.apple.com/?q="+mq+"' target='_blank' rel='noopener'>&#62; Apple Maps</a>";
    if(vd&&vd.web)h+="<a class='vl vl-w' href='"+he(vd.web)+"' target='_blank' rel='noopener'>&#127760; Website</a>";
    h+="</div></div>"; /* vlinks, vblock */
    h+="</div>"; /* expbox */
  }
  h+="</div>"; /* card */
  return h;
}

/* ── legend ── */
function renderLeg(){
  var h="<h3>GENRE LEGEND</h3><div class='legrow'>";
  ["j","b","o","g","w","s"].forEach(function(k){
    var gv=G[k];h+="<span class='lgi'><span class='lgb' style='background:"+gv.bg+";color:"+gv.c+"'>"+gv.e+"</span> "+he(gv.l)+"</span>";
  });
  h+="</div><div class='legprow'>";
  h+="<span class='legp'><span class='lgb' style='background:#d1fae5;color:#065f46'>FREE</span> Free admission</span>";
  h+="<span class='legp'><span class='lgb' style='background:#dbeafe;color:#1e40af'>&pound;X</span> Ticketed &mdash; price shown</span>";
  h+="<span class='legp'><span class='lgb' style='background:#d1fae5;color:#065f46'>FREE*</span> Free but reservation required</span>";
  h+="<span class='legp'><span class='lgb' style='background:#f3f4f6;color:#374151'>Incl.</span> Included in venue admission</span>";
  h+="<span class='legp'>Coloured initial dot = another family member wants this</span>";
  h+="</div>";
  document.getElementById("lg").innerHTML=h;
}

/* ── actions ── */
function sv(v){uiView=v;uiExp=-1;draw();}
function sd(d){uiDay=d;uiExp=-1;draw();}
function tg(k){if(uiGf[k])delete uiGf[k];else uiGf[k]=true;draw();}
function cg(){uiGf={};draw();}
function te(i){uiExp=(uiExp===i)?-1:i;draw();}
function tperf(n){uiPerfExp=(uiPerfExp===n)?null:n;renderPerf();}
function tf(i){
  if(!state.me)return;
  var a=state.picks[state.me]||(state.picks[state.me]=[]);
  var p=a.indexOf(i);if(p>=0)a.splice(p,1);else a.push(i);
  pushSt();draw();
}

/* ── share ── */
function shareLink(){
  pushSt();
  var url=window.location.href;
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(url).then(function(){alert("Link copied!\n\nPaste it into WhatsApp or email. When anyone opens it they will see all current picks and can add their own.");}).catch(function(){prompt("Copy this link:",url);});
  }else{prompt("Copy this link:",url);}
}

/* ── whatsapp copy ── */
function cp(){
  var myP=state.me&&state.picks[state.me]?state.picks[state.me]:[];
  if(!myP.length){alert("No picks yet!");return;}
  var lines=he(state.me)+"'s BJBF 2026 picks:\n\n";
  DS.forEach(function(d){
    var de=myP.filter(function(i){return R[i][0]===d[0];});
    if(!de.length)return;
    lines+=d[1]+(d[2]?" ("+d[2]+")":"")+":\n";
    de.forEach(function(i){lines+="  "+R[i][1]+" "+G[R[i][4]].e+" "+R[i][3]+" @ "+R[i][2]+" - "+R[i][5]+"\n";});
    lines+="\n";
  });
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(lines).then(function(){uiCopied=true;draw();setTimeout(function(){uiCopied=false;draw();},2500);}).catch(function(){fbCopy(lines);});
  }else{fbCopy(lines);}
}
function fbCopy(txt){
  var ta=document.createElement("textarea");ta.value=txt;ta.style.position="fixed";ta.style.top="-9999px";
  document.body.appendChild(ta);ta.select();
  try{document.execCommand("copy");uiCopied=true;draw();setTimeout(function(){uiCopied=false;draw();},2500);}
  catch(e){alert("Could not auto-copy.\n\n"+txt);}
  document.body.removeChild(ta);
}

</script>
